<style>
  .page-inner{padding:28px 32px;max-width:1300px;margin:0 auto;}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .page-title{font-size:18px;font-weight:700;}
  .btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.15s;}
  .btn:hover{opacity:0.85;}
  .btn-outline{background:transparent;border:0.5px solid var(--border2);color:var(--muted);}
  .btn-sm{padding:5px 12px;font-size:12px;}
  .btn-approve{background:var(--accent);color:#000;font-size:12px;padding:6px 14px;border-radius:7px;border:none;cursor:pointer;font-weight:700;}
  .btn-approve:disabled{opacity:0.4;cursor:not-allowed;}
  .filter-bar{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
  .filter-btn{padding:5px 14px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.15s;}
  .filter-btn.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700;}
  .req-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;display:flex;}
  .req-poster-strip{width:66px;flex-shrink:0;background:var(--border2);display:flex;align-items:center;justify-content:center;font-size:22px;min-height:90px;}
  .req-poster-strip img{width:66px;height:100%;object-fit:cover;display:block;}
  .req-body{flex:1;padding:13px 15px;min-width:0;}
  .req-title{font-size:14px;font-weight:600;margin-bottom:3px;}
  .req-meta{font-size:11px;color:var(--muted);margin-bottom:9px;}
  .req-footer{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .req-status{display:inline-block;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;}
  .rs-pending{background:rgba(240,151,30,0.15);color:var(--accent);}
  .rs-approved{background:rgba(59,212,122,0.15);color:var(--success);}
  .rs-processing{background:rgba(91,141,238,0.15);color:var(--info);}
  .rs-available{background:rgba(59,212,122,0.2);color:var(--success);}
  .rs-declined{background:rgba(224,59,59,0.15);color:var(--error);}
  .rs-partial{background:rgba(251,146,60,0.15);color:#fb923c;border:0.5px solid rgba(251,146,60,0.4);}
  .rs-einthubot{background:rgba(240,151,30,0.2);color:var(--accent);border:0.5px solid rgba(240,151,30,0.4);}
  .rs-completed{background:rgba(59,212,122,0.2);color:var(--success);border:0.5px solid rgba(59,212,122,0.4);}
  .rs-downloading{background:rgba(240,151,30,0.1);color:var(--accent);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .empty-state{padding:48px 20px;text-align:center;color:var(--muted);}
  .empty-icon{font-size:32px;margin-bottom:10px;}
  .empty-label{font-size:13px;}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Match-confirmation modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.2s;}
  .modal-overlay.show{opacity:1;pointer-events:all;}
  .match-wrap{background:var(--surface);border:0.5px solid var(--border2);border-radius:14px;padding:22px;width:520px;max-width:92vw;max-height:80vh;display:flex;flex-direction:column;}
  .match-wrap h3{font-size:15px;font-weight:600;margin-bottom:4px;}
  .match-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
  .match-warn{font-size:12px;color:#fb923c;background:rgba(251,146,60,0.1);border:0.5px solid rgba(251,146,60,0.3);border-radius:7px;padding:8px 12px;margin-bottom:12px;}
  .match-list{overflow-y:auto;flex:1;min-height:0;display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
  .match-item{display:flex;align-items:center;gap:12px;padding:9px 11px;border:1.5px solid var(--border2);border-radius:10px;cursor:pointer;transition:border-color 0.15s,background 0.15s;}
  .match-item:hover{background:var(--surface2);}
  .match-item.selected{border-color:var(--accent);background:var(--theme-tint,rgba(240,151,30,0.1));}
  .match-thumb{width:40px;height:56px;border-radius:6px;object-fit:cover;background:var(--border2);flex-shrink:0;}
  .match-thumb-ph{width:40px;height:56px;border-radius:6px;background:var(--border2);display:grid;place-items:center;font-size:16px;flex-shrink:0;}
  .match-info{flex:1;min-width:0;}
  .match-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .match-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .match-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;}
  .mt-best{background:rgba(59,212,122,0.15);color:var(--success);}
  .mt-uhd{background:rgba(139,92,246,0.2);color:#a78bfa;}
  .mt-hd{background:rgba(59,130,246,0.15);color:#60a5fa;}
  .match-actions{display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}
  .btn-confirm{background:var(--accent-btn-bg,var(--accent));color:#000;font-weight:700;}
  .btn-confirm:disabled{opacity:0.4;cursor:not-allowed;}
</style>

<div class="page-inner">
  <div class="page-header">
    <div class="page-title">Requests</div>
    <button class="btn btn-outline btn-sm" onclick="loadReqs()">↻ Refresh</button>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('approved',this)">Approved</button>
    <button class="filter-btn" onclick="setFilter('processing',this)">Processing</button>
    <button class="filter-btn" onclick="setFilter('available',this)">Available</button>
    <button class="filter-btn" onclick="setFilter('partial',this)">Partial</button>
    <button class="filter-btn" onclick="setFilter('declined',this)">Declined</button>
  </div>
  <div id="reqList"><div class="empty-state"><span class="spin"></span> Loading…</div></div>
</div>

<!-- Match-confirmation modal -->
<div class="modal-overlay" id="matchModal">
  <div class="match-wrap">
    <h3 id="matchHeading">Confirm match</h3>
    <div class="match-sub" id="matchSub"></div>
    <div class="match-warn" id="matchWarn" style="display:none;">⚠ No confident match was found — pick the right movie manually, or cancel.</div>
    <div class="match-list" id="matchList"></div>
    <div class="match-actions">
      <button class="btn btn-outline btn-sm" onclick="closeMatchModal()">Cancel</button>
      <button class="btn btn-confirm btn-sm" id="matchConfirmBtn" onclick="confirmMatch()" disabled>⬇ Download selected</button>
    </div>
  </div>
</div>

<script>
var RS = {pending:{l:'Pending',c:'rs-pending'},approved:{l:'Approved',c:'rs-approved'},processing:{l:'Processing',c:'rs-processing'},available:{l:'Available',c:'rs-available'},declined:{l:'Declined',c:'rs-declined'},partial:{l:'Partially Available',c:'rs-partial'}};
var allReqs = [], reqFilter = 'all';

function setFilter(f, btn) {
  reqFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderReqs();
}

function renderReqs() {
  var el = document.getElementById('reqList');
  var list = reqFilter==='all' ? allReqs : allReqs.filter(r=>r.status===reqFilter);
  if (!list.length) { el.innerHTML=`<div class="empty-state"><div class="empty-icon">📥</div><div class="empty-label">No ${reqFilter==='all'?'':reqFilter+' '}requests</div></div>`; return; }
  el.innerHTML = list.map(req => {
    var st = RS[req.status]||{l:req.status,c:'rs-pending'};
    var isCompleted=req.einthubot_completed, dlStatus=req.download_status;
    var isDown=['downloading','queued','pausing'].includes(dlStatus), isPaused=dlStatus==='paused';
    var canApprove=!isCompleted&&!isDown&&!isPaused&&req.media_type==='movie';
    var badge='';
    if(isCompleted)  badge=`<span class="req-status rs-completed">✓ Completed</span>`;
    else if(isDown)  badge=`<span class="req-status rs-downloading">⬇ Downloading</span>`;
    else if(isPaused)badge=`<span class="req-status rs-einthubot">⏸ Paused</span>`;
    else if(req.einthubot_approved) badge=`<span class="req-status rs-einthubot">⬇ EinthuBot</span>`;
    return `
      <div class="req-card">
        <div class="req-poster-strip">${req.poster?`<img src="${esc(req.poster)}" alt="" onerror="this.style.display='none'">`:'🎬'}</div>
        <div class="req-body">
          <div class="req-title">${esc(req.title)} <span style="color:var(--muted);font-weight:400;">(${esc(req.year)})</span></div>
          <div class="req-meta">Requested by <strong>${esc(req.requested_by||'Unknown')}</strong> · ${new Date(req.created_at).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}${req.original_title&&req.original_title!==req.title?` · aka ${esc(req.original_title)}`:''}</div>
          <div class="req-footer">
            <span class="req-status ${st.c}">${st.l}</span>
            ${badge}
            ${canApprove?`<button class="btn-approve" onclick="reqApprove(${req.id},this)">▶ Download</button>`:''}
          </div>
        </div>
      </div>`;
  }).join('');
}

async function loadReqs() {
  document.getElementById('reqList').innerHTML=`<div class="empty-state"><span class="spin"></span> Loading…</div>`;
  try {
    allReqs = await fetch('/api/requests').then(r=>r.json());
    if (allReqs.error) throw new Error(allReqs.error);
    window.setReqBadge(allReqs.filter(r=>r.status==='pending').length);
    renderReqs();
  } catch(e) { document.getElementById('reqList').innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-label">Could not load requests</div></div>`; }
}

// ── Match confirmation flow ──────────────────────────────────────────────────
var _matchReq = null, _matchCandidates = [], _matchSelected = -1;

async function reqApprove(reqId, btn) {
  var req = allReqs.find(r=>r.id===reqId);
  if (!req) return;
  btn.disabled=true; btn.textContent='⏳ Searching…';
  try {
    var d=await fetch('/api/approve/preview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({request_id:req.id,title:req.title,year:req.year,original_title:req.original_title||''})}).then(r=>r.json());
    if(d.ok && (d.candidates||[]).length){
      openMatchModal(req, d.candidates, d.match_url);
    } else {
      showToast(d.error||'Not found on Einthusan','error');
    }
  }catch(e){showToast('Search failed','error');}
  finally{btn.disabled=false;btn.textContent='▶ Download';}
}

function openMatchModal(req, candidates, matchUrl) {
  _matchReq        = req;
  _matchCandidates = candidates;
  _matchSelected   = candidates.findIndex(c=>c.url===matchUrl);
  _matchInitial    = _matchSelected;
  document.getElementById('matchHeading').textContent = `Confirm match for "${req.title}"`;
  document.getElementById('matchSub').textContent =
    `Requested: ${req.title} (${req.year||'?'}) — pick the Einthusan result to download`;
  document.getElementById('matchWarn').style.display = _matchSelected < 0 ? 'block' : 'none';
  renderMatchList();
  document.getElementById('matchModal').classList.add('show');
}

function renderMatchList() {
  var el = document.getElementById('matchList');
  el.innerHTML = _matchCandidates.map((c,i)=>`
    <div class="match-item ${i===_matchSelected?'selected':''}" onclick="selectMatch(${i})">
      ${c.thumb?`<img class="match-thumb" src="${esc(c.thumb)}" alt="" loading="lazy" onerror="this.style.display='none'">`:`<div class="match-thumb-ph">🎬</div>`}
      <div class="match-info">
        <div class="match-title">${esc(c.title)}</div>
        <div class="match-meta">
          <span>${esc(c.year||'?')}</span> · <span>${esc(c.language||'')}</span>
          ${c.uhd?`<span class="match-tag mt-uhd">⬆ UHD</span>`:c.hd?`<span class="match-tag mt-hd">HD</span>`:''}
          ${i===_matchInitial?`<span class="match-tag mt-best">Best match</span>`:''}
        </div>
      </div>
    </div>`).join('');
  document.getElementById('matchConfirmBtn').disabled = _matchSelected < 0;
}

var _matchInitial = -1;

function selectMatch(i) {
  _matchSelected = i;
  renderMatchList();
}

function closeMatchModal() {
  document.getElementById('matchModal').classList.remove('show');
  _matchReq = null; _matchCandidates = []; _matchSelected = -1; _matchInitial = -1;
}

async function confirmMatch() {
  if (!_matchReq || _matchSelected < 0) return;
  var req = _matchReq, chosen = _matchCandidates[_matchSelected];
  var btn = document.getElementById('matchConfirmBtn');
  btn.disabled = true; btn.textContent = '⏳ Starting…';
  try {
    var d = await fetch('/api/approve/confirm',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({request_id:req.id,tmdb_id:req.tmdb_id,title:req.title,year:req.year,url:chosen.url})}).then(r=>r.json());
    if (d.ok) {
      showToast(`Downloading "${chosen.title}" (${chosen.year||'?'})`,'success','Match confirmed');
      closeMatchModal();
      setTimeout(loadReqs, 2000);
    } else {
      showToast(d.error||'Failed to start download','error');
    }
  } catch(e) { showToast('Failed to start download','error'); }
  finally { btn.disabled = false; btn.textContent = '⬇ Download selected'; }
}

document.getElementById('matchModal').addEventListener('click', function(e){
  if (e.target === this) closeMatchModal();
});

window.init_requests = loadReqs;
</script>
