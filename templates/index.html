<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EinthuBot</title>
  <style>
    :root {
      --bg:#0a0a0f; --surface:#12121c; --surface2:#1a1a28;
      --border:#1e1e30; --border2:#2a2a40;
      --accent:#f0971e; --text:#e8e6f0; --muted:#5a5a7a; --muted2:#3d3d5c;
      --success:#3bd47a; --error:#e03b3b; --info:#5b8dee; --radius:10px; --sb:220px;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter','Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; overflow:hidden; }

    /* ── Sidebar ── */
    #sidebar { width:var(--sb); min-width:var(--sb); background:#0a0a0f; border-right:0.5px solid var(--border); display:flex; flex-direction:column; height:100vh; position:sticky; top:0; transition:width 0.25s ease,min-width 0.25s ease; overflow:hidden; z-index:50; flex-shrink:0; }
    #sidebar.collapsed { width:60px; min-width:60px; }

    .sb-logo { display:flex; align-items:center; gap:10px; padding:18px 14px 14px; border-bottom:0.5px solid var(--border); flex-shrink:0; overflow:hidden; }
    .sb-logo-icon { width:34px; height:34px; border-radius:9px; background:var(--accent); display:grid; place-items:center; font-size:18px; flex-shrink:0; }
    .sb-logo-text { overflow:hidden; white-space:nowrap; }
    .sb-logo-name { font-size:14px; font-weight:600; color:var(--text,#fff); }
    .sb-logo-status { font-size:10px; color:var(--success); margin-top:2px; }
    .sb-logo-status.offline { color:var(--error); }
    #sidebar.collapsed .sb-logo-text { display:none; }

    .sb-body { flex:1; overflow-y:auto; overflow-x:hidden; padding:10px 8px; display:flex; flex-direction:column; gap:2px; }
    .sb-body::-webkit-scrollbar { width:0; }

    .sb-section { font-size:10px; font-weight:600; color:var(--muted2); text-transform:uppercase; letter-spacing:.08em; padding:0 8px; margin:8px 0 3px; white-space:nowrap; transition:opacity 0.2s; }
    #sidebar.collapsed .sb-section { opacity:0; pointer-events:none; }

    .nav-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; cursor:pointer; border:0.5px solid transparent; transition:background 0.15s; position:relative; overflow:hidden; }
    .nav-item:hover { background:var(--surface2); }
    .nav-item.active { background:rgba(240,151,30,0.1); border-color:rgba(240,151,30,0.2); }
    .nav-icon { width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--muted); transition:color 0.15s; }
    .nav-icon svg { width:18px; height:18px; stroke:currentColor; }
    .nav-item.active .nav-icon { color:var(--accent); }
    .btn-accent, .btn-approve { background: var(--accent-btn-bg, var(--accent)) !important; }
    .nav-label { font-size:13px; color:var(--muted); white-space:nowrap; overflow:hidden; transition:color 0.15s,max-width 0.25s,opacity 0.2s; max-width:160px; }
    .nav-item.active .nav-label { color:var(--accent); font-weight:500; }
    #sidebar.collapsed .nav-label { max-width:0; opacity:0; }
    .nav-badge { margin-left:auto; background:var(--accent); color:var(--accent-fg,#000); font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; flex-shrink:0; transition:opacity 0.2s,max-width 0.25s; max-width:40px; overflow:hidden; }
    #sidebar.collapsed .nav-badge { opacity:0; max-width:0; padding:0; }

    /* Active download mini-card */
    .sb-dl { flex-shrink:0; padding:10px 8px; border-top:0.5px solid var(--border); }
    .sb-dl-card { background:var(--surface2); border:0.5px solid rgba(240,151,30,0.25); border-radius:10px; padding:10px; }
    .sb-dl-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
    .sb-dl-thumb { width:30px; height:42px; background:var(--border2); border-radius:5px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; overflow:hidden; }
    .sb-dl-info { flex:1; min-width:0; }
    .sb-dl-title { font-size:10px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sb-dl-size  { font-size:9px; color:var(--muted); margin-top:2px; }
    .sb-dl-btns  { display:flex; gap:4px; }
    .sb-dl-btn   { width:24px; height:24px; border-radius:5px; background:var(--border2); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--muted); }
    .sb-dl-btn svg { width:12px; height:12px; stroke:currentColor; }
    .sb-dl-bar  { background:var(--border2); border-radius:3px; height:3px; overflow:hidden; }
    .sb-dl-fill { height:3px; background:var(--accent); border-radius:3px; transition:width 0.5s; }
    #sidebar.collapsed .sb-dl { display:none; }

    /* Collapse toggle */
    .sb-toggle { flex-shrink:0; padding:10px 8px; border-top:0.5px solid var(--border); }
    .sb-toggle-btn { width:100%; display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; cursor:pointer; border:0.5px solid var(--border2); background:var(--surface); color:var(--muted); font-size:13px; transition:background 0.15s; }
    .sb-toggle-btn:hover { background:var(--surface2); }
    .sb-toggle-icon { width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:transform 0.25s; }
    .sb-toggle-icon svg { width:16px; height:16px; stroke:currentColor; }
    #sidebar.collapsed .sb-toggle-icon { transform:rotate(180deg); }
    .sb-toggle-label { white-space:nowrap; overflow:hidden; transition:opacity 0.2s,max-width 0.25s; max-width:160px; }
    #sidebar.collapsed .sb-toggle-label { opacity:0; max-width:0; }

    /* ── Main ── */
    #main { flex:1; display:flex; flex-direction:column; height:100vh; overflow:hidden; min-width:0; background:var(--bg); transition:background 0.3s; }
    #session-banner { background:rgba(224,59,59,0.12); border-bottom:0.5px solid rgba(224,59,59,0.3); padding:9px 24px; display:none; align-items:center; gap:10px; flex-shrink:0; }
    #session-banner.show { display:flex; }
    #session-banner span { font-size:13px; color:#f4a0a0; flex:1; }
    .banner-btn { background:var(--error); color:#fff; border:none; border-radius:7px; padding:5px 14px; font-size:12px; font-weight:600; cursor:pointer; }

    /* Page container */
    #page-container { flex:1; overflow-y:auto; position:relative; background:var(--bg); transition:background 0.3s; }
    .page-loading { display:flex; align-items:center; justify-content:center; height:200px; color:var(--muted); font-size:13px; }
    .spin { display:inline-block; width:15px; height:15px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Toast */
    #toast-container { position:fixed; bottom:24px; right:24px; display:flex; flex-direction:column; gap:8px; z-index:9999; }
    .toast { background:var(--surface); border:0.5px solid var(--border2); border-radius:var(--radius); padding:12px 16px; display:flex; align-items:center; gap:12px; min-width:260px; max-width:360px; transform:translateX(120%); opacity:0; transition:all 0.3s ease; }
    .toast.show { transform:translateX(0); opacity:1; }
    .toast-thumb-ph { width:34px; height:48px; border-radius:5px; background:var(--border2); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .toast-body { flex:1; min-width:0; }
    .toast-title { font-size:12px; font-weight:600; margin-bottom:2px; }
    .toast-msg   { font-size:11px; color:var(--muted); }
    .toast-icon  { flex-shrink:0; }
    .toast-icon svg { width:18px; height:18px; stroke:currentColor; }
    .t-success .toast-icon { color:var(--success); }
    .t-error   .toast-icon { color:var(--error); }
    .t-info    .toast-icon { color:var(--info); }
    .toast-close { background:none; border:none; cursor:pointer; color:var(--muted); font-size:14px; padding:0; flex-shrink:0; }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

    /* ── Match-confirmation modal (shared by Home + Requests tabs) ── */
    #matchModal { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:300; opacity:0; pointer-events:none; transition:opacity 0.2s; }
    #matchModal.show { opacity:1; pointer-events:all; }
    .match-wrap { background:var(--surface); border:0.5px solid var(--border2); border-radius:14px; padding:22px; width:520px; max-width:92vw; max-height:80vh; display:flex; flex-direction:column; }
    .match-wrap h3 { font-size:15px; font-weight:600; margin-bottom:4px; }
    .match-sub { font-size:12px; color:var(--muted); margin-bottom:14px; }
    .match-warn { font-size:12px; color:#fb923c; background:rgba(251,146,60,0.1); border:0.5px solid rgba(251,146,60,0.3); border-radius:7px; padding:8px 12px; margin-bottom:12px; }
    .match-list { overflow-y:auto; flex:1; min-height:0; display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
    .match-item { display:flex; align-items:center; gap:12px; padding:9px 11px; border:1.5px solid var(--border2); border-radius:10px; cursor:pointer; transition:border-color 0.15s,background 0.15s; }
    .match-item:hover { background:var(--surface2); }
    .match-item.selected { border-color:var(--accent); background:var(--theme-tint,rgba(240,151,30,0.1)); }
    .match-thumb { width:40px; height:56px; border-radius:6px; object-fit:cover; background:var(--border2); flex-shrink:0; }
    .match-thumb-ph { width:40px; height:56px; border-radius:6px; background:var(--border2); display:grid; place-items:center; font-size:16px; flex-shrink:0; }
    .match-info { flex:1; min-width:0; }
    .match-title { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .match-meta { font-size:11px; color:var(--muted); margin-top:2px; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
    .match-tag { display:inline-block; padding:1px 6px; border-radius:4px; font-size:10px; font-weight:700; }
    .mt-best { background:rgba(59,212,122,0.15); color:var(--success); }
    .mt-uhd { background:rgba(139,92,246,0.2); color:#a78bfa; }
    .mt-hd { background:rgba(59,130,246,0.15); color:#60a5fa; }
    .match-actions { display:flex; gap:8px; justify-content:flex-end; flex-shrink:0; }
    .match-actions button { padding:6px 14px; border-radius:8px; border:none; font-size:12px; font-weight:600; cursor:pointer; transition:opacity 0.15s; font-family:inherit; }
    .match-actions button:hover { opacity:0.85; }
    .match-btn-cancel { background:transparent; border:0.5px solid var(--border2) !important; color:var(--muted); }
    .match-btn-confirm { background:var(--accent-btn-bg,var(--accent)); color:var(--accent-fg,#000); font-weight:700; }
    .match-btn-confirm:disabled { opacity:0.4; cursor:not-allowed; }

    /* ── Light-theme readability overrides ──
       Partial styles hardcode bright greens/blues/purples that assume a dark
       background; body.theme-light out-specifies them with darker variants. */
    body.theme-light .conn-ok { background:rgba(21,128,61,0.1); color:#15803d; }
    body.theme-light .rs-partial { background:rgba(194,87,10,0.1); color:#c2570a; border-color:rgba(194,87,10,0.4); }
    body.theme-light .uhd-chip, body.theme-light .tag-uhd, body.theme-light .mt-uhd { background:rgba(124,58,237,0.1); color:#7c3aed; border-color:rgba(124,58,237,0.4); }
    body.theme-light .tag-hd, body.theme-light .mt-hd { background:rgba(37,99,235,0.1); color:#2563eb; }
    body.theme-light .media-rating { color:#f0971e; }  /* amber pops on the dark poster overlay */
    body.theme-light .btn-watch-card { color:#15803d; border-color:rgba(21,128,61,0.4); background:rgba(21,128,61,0.08); }
    body.theme-light .btn-resume { color:#15803d; border-color:#15803d; background:rgba(21,128,61,0.1); }
    body.theme-light .btn-success { color:#15803d; border-color:#15803d; }

    /* ── Mobile (≤768px): sidebar becomes a fixed icon rail ── */
    @media (max-width:768px) {
      #sidebar { width:60px; min-width:60px; }
      .sb-logo { padding:14px 12px 12px; justify-content:center; }
      .sb-logo-text { display:none; }
      .sb-section { opacity:0; height:4px; margin:4px 0 0; pointer-events:none; }
      .nav-item { justify-content:center; padding:11px 10px; }
      .nav-label { max-width:0; opacity:0; }
      .nav-badge { position:absolute; top:3px; right:3px; margin:0; padding:1px 5px; font-size:9px; max-width:none; }
      /* !important: JS sets display:block inline while a download is active */
      .sb-dl { display:none !important; }
      .sb-toggle { display:none; }
      #toast-container { left:12px; right:12px; bottom:12px; }
      .toast { min-width:0; max-width:none; width:100%; }
      .match-wrap { padding:16px; max-height:88vh; }
      .match-actions button { padding:11px 16px; }
    }

    /* ── VIP glassmorphism tier (body.theme-glass) ──
       Surfaces go translucent (rgba --surface vars set by the theme) and key
       panels get backdrop blur so the animated canvas glows through them. */
    body.theme-glass #sidebar {
      background:rgba(10,8,16,0.55);
      backdrop-filter:blur(18px) saturate(1.3); -webkit-backdrop-filter:blur(18px) saturate(1.3);
      border-right-color:rgba(255,255,255,0.08);
    }
    body.theme-glass .stat-card, body.theme-glass .card, body.theme-glass .req-card,
    body.theme-glass .dl-card, body.theme-glass .settings-section, body.theme-glass .media-card,
    body.theme-glass .modal-box, body.theme-glass .match-wrap, body.theme-glass .confirm-wrap,
    body.theme-glass .toast, body.theme-glass .save-bar, body.theme-glass .reveal-bar {
      backdrop-filter:blur(14px) saturate(1.25); -webkit-backdrop-filter:blur(14px) saturate(1.25);
      border-color:rgba(255,255,255,0.09);
      box-shadow:0 8px 32px rgba(0,0,0,0.35);
    }
    body.theme-glass .nav-item.active { backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
    @media (max-width:768px) {
      /* cheaper blur on phone GPUs; poster grid keeps translucency only */
      body.theme-glass #sidebar { backdrop-filter:blur(10px) saturate(1.2); -webkit-backdrop-filter:blur(10px) saturate(1.2); }
      body.theme-glass .stat-card, body.theme-glass .card, body.theme-glass .req-card,
      body.theme-glass .dl-card, body.theme-glass .settings-section,
      body.theme-glass .modal-box, body.theme-glass .match-wrap, body.theme-glass .confirm-wrap,
      body.theme-glass .toast, body.theme-glass .save-bar, body.theme-glass .reveal-bar {
        backdrop-filter:blur(9px) saturate(1.2); -webkit-backdrop-filter:blur(9px) saturate(1.2);
      }
      body.theme-glass .media-card { backdrop-filter:none; -webkit-backdrop-filter:none; }
    }
  </style>
</head>
<body>

<!-- Animated background canvas -->
<canvas id="animBg" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0;transition:opacity 0.5s;"></canvas>

<aside id="sidebar" style="position:relative;z-index:1;">
  <div class="sb-logo">
    <div class="sb-logo-icon">🎬</div>
    <div class="sb-logo-text">
      <div class="sb-logo-name">EinthuBot</div>
      <div class="sb-logo-status" id="logoStatus">● Connecting…</div>
    </div>
  </div>

  <div class="sb-body">
    <div class="sb-section">Discover</div>
    <div class="nav-item active" data-page="home">
      <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12L3 12L12 3L21 12L19 12"/><path d="M5 12V19C5 19.6 5.4 20 6 20H9V16C9 15.4 9.4 15 10 15H14C14.6 15 15 15.4 15 16V20H18C18.6 20 19 19.6 19 19V12"/></svg></div>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-item" data-page="search">
      <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><line x1="21" y1="21" x2="15" y2="15"/></svg></div>
      <span class="nav-label">Search</span>
    </div>

    <div class="sb-section">Manage</div>
    <div class="nav-item" data-page="requests">
      <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="3,14 7,14 8,17 16,17 17,14 21,14"/></svg></div>
      <span class="nav-label">Requests</span>
      <span class="nav-badge" id="reqBadge" style="display:none">0</span>
    </div>
    <div class="nav-item" data-page="downloads">
      <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/><polyline points="7,11 12,16 17,11"/><line x1="12" y1="4" x2="12" y2="16"/></svg></div>
      <span class="nav-label">Downloads</span>
      <span class="nav-badge" id="dlBadge" style="display:none;background:var(--info);color:#fff;">0</span>
    </div>
    <div class="nav-item" data-page="library">
      <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M8 3l4 4 4-4"/></svg></div>
      <span class="nav-label">Library</span>
      <span class="nav-badge" id="libBadge" style="display:none;background:var(--info);color:#fff;">0</span>
    </div>
    <div class="nav-item" data-page="activity">
      <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg></div>
      <span class="nav-label">Activity</span>
    </div>
    <div class="nav-item" data-page="settings">
      <div class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>
      <span class="nav-label">Settings</span>
    </div>
  </div>

  <!-- Active download mini-card -->
  <div class="sb-dl" id="sbDl" style="display:none;">
    <div class="sb-dl-card">
      <div class="sb-dl-row">
        <div class="sb-dl-thumb" id="sbDlThumb">🎬</div>
        <div class="sb-dl-info">
          <div class="sb-dl-title" id="sbDlTitle">—</div>
          <div class="sb-dl-size"  id="sbDlSize">—</div>
        </div>
        <div class="sb-dl-btns">
          <button class="sb-dl-btn" id="sbDlPause" title="Pause/Resume">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <button class="sb-dl-btn" id="sbDlCancel" title="Cancel">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="sb-dl-bar"><div class="sb-dl-fill" id="sbDlFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="sb-toggle">
    <button class="sb-toggle-btn" onclick="toggleSidebar()">
      <div class="sb-toggle-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="20" y1="12" x2="10" y2="12"/><polyline points="15,7 10,12 15,17"/><line x1="4" y1="5" x2="4" y2="19"/></svg>
      </div>
      <span class="sb-toggle-label">Collapse</span>
    </button>
  </div>
</aside>

<div id="main" style="position:relative;z-index:1;">
  <div id="session-banner">

window.applyTheme = function(name) {
  const t = THEMES[name] || THEMES.amber;
  const r = document.documentElement.style;
  r.setProperty('--accent',    t.accent);
  r.setProperty('--bg',        t.bg);
  r.setProperty('--surface',   t.surface);
  r.setProperty('--surface2',  t.surface2);
  r.setProperty('--border',    t.border);
  r.setProperty('--border2',   t.border2);
  r.setProperty('--theme-tint',        t.tint);
  r.setProperty('--theme-tint-border', t.tintBorder);
  if (t.gradient) {
    r.setProperty('--accent-gradient', `linear-gradient(135deg,${t.gradientFrom},${t.gradientTo})`);
    r.setProperty('--accent-btn-bg',   `linear-gradient(135deg,${t.gradientFrom},${t.gradientTo})`);
  } else {
    r.setProperty('--accent-gradient', t.accent);
    r.setProperty('--accent-btn-bg',   t.accent);
  }
  // Light mode text adjustments
  if (t.light) {
    r.setProperty('--text',  '#1a1a2e');
    r.setProperty('--muted', '#6060a0');
    r.setProperty('--muted2','#9090c0');
  } else {
    r.setProperty('--text',  '#e8e6f0');
    r.setProperty('--muted', '#5a5a7a');
    r.setProperty('--muted2','#3d3d5c');
  }
  // Text on accent-colored surfaces: light theme's accent is near-black navy,
  // so the usual black button text becomes unreadable — flip to white there.
  // Status greens/blues also need darker variants on a light background.
  r.setProperty('--accent-fg', t.light ? '#fff' : '#000');
  r.setProperty('--success',   t.light ? '#15803d' : '#3bd47a');
  r.setProperty('--info',      t.light ? '#2563eb' : '#5b8dee');
  document.body.classList.toggle('theme-light', !!t.light);
  document.body.classList.toggle('theme-glass', !!t.glass);
  localStorage.setItem('einthubot_theme', name);
  window._currentTheme = name;
  document.body.style.background = t.bg;
  document.body.style.color = t.light ? '#1a1a2e' : '#e8e6f0';
  const pc = document.getElementById('page-container');
  if (pc) pc.style.background = 'transparent';
  const sb = document.getElementById('sidebar');
  // glass: clear inline style so the body.theme-glass #sidebar CSS rule wins
  if (sb) sb.style.background = t.glass ? '' : (t.animated ? 'transparent' : t.bg);
  const mn = document.getElementById('main');
  if (mn) mn.style.background = 'transparent';
  // Start or stop animation
  if (t.animated) {
    window.startAnimation && window.startAnimation(t.animated);
  } else {
    window.stopAnimation && window.stopAnimation();
  }
};

// ── Toast (global, available to all partials) ─────────────────────────────────
window.showToast = function(msg, type='info', title='') {
  const icons = {
    success: '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9,12 11,14 15,10"/></svg>',
    error:   '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    info:    '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
  };
  const t = document.createElement('div');
  t.className = `toast t-${type}`;
  // msg/title often contain scraped movie titles — never render them raw
  const _e = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  t.innerHTML = `
    <div class="toast-thumb-ph">🎬</div>
    <div class="toast-body">${title ? `<div class="toast-title">${_e(title)}</div>` : ''}<div class="toast-msg">${_e(msg)}</div></div>
    <div class="toast-icon">${icons[type]||icons.info}</div>
    <button class="toast-close" onclick="this.closest('.toast').remove()">✕</button>`;
  document.getElementById('toast-container').appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 4500);
};

// ── TMDB key ──────────────────────────────────────────────────────────────────
window.getTmdbKey = async function() {
  if (window._tmdbKey !== null) return window._tmdbKey;
  try { const s = await fetch('/api/status').then(r=>r.json()); window._tmdbKey = s.tmdb_api_key || ''; }
  catch(e) { window._tmdbKey = ''; }
  return window._tmdbKey;
};

// ── Escape html ───────────────────────────────────────────────────────────────
window.esc = function(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
};
// Escape for embedding inside a single-quoted JS string in an inline handler.
// Use as esc(escJs(s)) — HTML entities in attributes are decoded before the JS
// engine parses them, so entity-escaping alone does not protect JS strings.
window.escJs = function(s) {
  return String(s ?? '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
};

// ── Status & session banner ───────────────────────────────────────────────────
async function loadStatus() {
  try {
    const d = await fetch('/api/status').then(r=>r.json());
    if (d.tmdb_api_key) window._tmdbKey = d.tmdb_api_key;
    const st = document.getElementById('logoStatus');
    const banner = document.getElementById('session-banner');
    if (d.logged_in) {
      st.textContent = '● Online · Premium';
      st.className = 'sb-logo-status';
      banner.classList.remove('show');
    } else {
      st.textContent = '● Session expired';
      st.className = 'sb-logo-status offline';
      banner.classList.add('show');
    }
  } catch(e) {}
}
async function retryLogin() {
  showToast('Retrying login…', 'info');
  await fetch('/api/retry_login', { method: 'POST' });
  setTimeout(loadStatus, 1500);
}

// ── Match-confirmation flow (shared by Home + Requests tabs) ──────────────────
let _matchReq = null, _matchCandidates = [], _matchSelected = -1, _matchInitial = -1, _matchOnDone = null;

window.startMatchFlow = async function(req, btn, onDone) {
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '⏳ Searching…';
  try {
    const d = await fetch('/api/approve/preview', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({request_id:req.id, title:req.title, year:req.year, original_title:req.original_title||''})}).then(r=>r.json());
    if (d.ok && (d.candidates||[]).length) {
      openMatchModal(req, d.candidates, d.match_url, onDone);
    } else {
      showToast(d.error||'Not found on Einthusan','error');
    }
  } catch(e) { showToast('Search failed','error'); }
  finally { btn.disabled = false; btn.textContent = orig; }
};

function openMatchModal(req, candidates, matchUrl, onDone) {
  _matchReq        = req;
  _matchCandidates = candidates;
  _matchSelected   = candidates.findIndex(c=>c.url===matchUrl);
  _matchInitial    = _matchSelected;
  _matchOnDone     = onDone || null;
  document.getElementById('matchHeading').textContent = `Confirm match for "${req.title}"`;
  document.getElementById('matchSub').textContent =
    `Requested: ${req.title} (${req.year||'?'}) — pick the Einthusan result to download`;
  document.getElementById('matchWarn').style.display = _matchSelected < 0 ? 'block' : 'none';
  renderMatchList();
  document.getElementById('matchModal').classList.add('show');
}

function renderMatchList() {
  document.getElementById('matchList').innerHTML = _matchCandidates.map((c,i)=>`
    <div class="match-item ${i===_matchSelected?'selected':''}" onclick="selectMatch(${i})">
      ${c.thumb?`<img class="match-thumb" src="${esc(c.thumb)}" alt="" loading="lazy" onerror="this.style.display='none'">`:`<div class="match-thumb-ph">🎬</div>`}
      <div class="match-info">
        <div class="match-title">${esc(c.title)}</div>
        <div class="match-meta">
          <span>${esc(c.year||'?')}</span> · <span>${esc(c.language||'')}</span>
          ${c.uhd?`<span class="match-tag mt-uhd">⬆ UHD</span>`:c.hd?`<span class="match-tag mt-hd">HD</span>`:''}
          ${i===_matchInitial?`<span class="match-tag mt-best">Best match</span>`:''}
        </div>
      </div>
    </div>`).join('');
  document.getElementById('matchConfirmBtn').disabled = _matchSelected < 0;
}

window.selectMatch = function(i) { _matchSelected = i; renderMatchList(); };

window.closeMatchModal = function() {
  document.getElementById('matchModal').classList.remove('show');
  _matchReq = null; _matchCandidates = []; _matchSelected = -1; _matchInitial = -1; _matchOnDone = null;
};

window.confirmMatch = async function() {
  if (!_matchReq || _matchSelected < 0) return;
  const req = _matchReq, chosen = _matchCandidates[_matchSelected], onDone = _matchOnDone;
  const btn = document.getElementById('matchConfirmBtn');
  btn.disabled = true; btn.textContent = '⏳ Starting…';
  try {
    const d = await fetch('/api/approve/confirm', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({request_id:req.id, tmdb_id:req.tmdb_id, title:req.title, year:req.year, url:chosen.url})}).then(r=>r.json());
    if (d.ok) {
      showToast(`Downloading "${chosen.title}" (${chosen.year||'?'})`,'success','Match confirmed');
      closeMatchModal();
      if (onDone) onDone();
    } else {
      showToast(d.error||'Failed to start download','error');
    }
  } catch(e) { showToast('Failed to start download','error'); }
  finally { btn.disabled = false; btn.textContent = '⬇ Download selected'; }
};

document.getElementById('matchModal').addEventListener('click', function(e){
  if (e.target === this) closeMatchModal();
});

// ── Sidebar download mini-card (global) ───────────────────────────────────────
window.updateSidebarDl = function(downloads) {
  const active = downloads.filter(d => ['downloading','queued','paused','pausing','retrying'].includes(d.status));
  const dl = active.find(d => d.status === 'downloading') || active[0];
  const sbDl = document.getElementById('sbDl');
  const dlBadge = document.getElementById('dlBadge');

  dlBadge.style.display = active.length ? 'inline' : 'none';
  dlBadge.textContent = active.length;

  if (dl) {
    sbDl.style.display = 'block';
    document.getElementById('sbDlTitle').textContent = dl.title || '';
    let eta = '';
    if (dl.status === 'downloading' && dl.eta_seconds != null && isFinite(dl.eta_seconds) && dl.eta_seconds >= 0) {
      const s = Math.round(dl.eta_seconds);
      eta = ' · ' + (s >= 3600 ? Math.floor(s/3600)+'h '+Math.round((s%3600)/60)+'m left'
                  : s >= 60   ? Math.floor(s/60)+'m '+(s%60)+'s left'
                  : s+'s left');
    }
    document.getElementById('sbDlSize').textContent  = `${dl.size_mb||0} / ${dl.total_mb||0} MB · ${dl.progress||0}%${eta}`;
    document.getElementById('sbDlFill').style.width  = `${dl.progress||0}%`;
    const pb = document.getElementById('sbDlPause');
    // Pause is only valid mid-transfer; resume only when paused — the backend
    // rejects both for queued/pausing items, so don't offer a dead button.
    pb.style.display = (dl.status === 'downloading' || dl.status === 'paused') ? '' : 'none';
    pb.innerHTML = dl.status === 'paused'
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,3 19,12 5,21 5,3"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
    pb.onclick = async () => {
      await fetch(`/api/${dl.status==='paused'?'resume':'pause'}/${dl.id}`, {method:'POST'});
      window._refreshDownloads && window._refreshDownloads();
    };
    document.getElementById('sbDlCancel').onclick = async () => {
      await fetch(`/api/cancel/${dl.id}`, {method:'POST'});
      window._refreshDownloads && window._refreshDownloads();
    };
  } else {
    sbDl.style.display = 'none';
  }
};

// ── Page loader ───────────────────────────────────────────────────────────────
let currentPage = null;
let prevPage    = null;

async function loadPage(name) {
  if (currentPage === name) return;
  prevPage    = currentPage;
  // When leaving settings, reapply the saved theme
  // Skip if we just saved (flag set by saveSettings)
  if (prevPage === 'settings' && !window._justSaved) {
    const saved = localStorage.getItem('einthubot_theme') || 'amber';
    window.applyTheme(saved);
  }
  window._justSaved = false;
  currentPage = name;

  // Update nav
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === name);
  });

  // Show loading state
  const container = document.getElementById('page-container');
  container.innerHTML = '<div class="page-loading"><span class="spin"></span> Loading…</div>';

  // Fetch the partial
  try {
    const html = await fetch(`/partials/${name}`).then(r => r.text());
    container.innerHTML = html;

    // Re-execute all script tags in the injected HTML
    const scripts = container.querySelectorAll('script');
    for (const oldScript of scripts) {
      const newScript = document.createElement('script');
      newScript.textContent = oldScript.textContent;
      document.body.appendChild(newScript);
      document.body.removeChild(newScript);
    }

    // Run the partial's init function if it exists
    if (typeof window[`init_${name}`] === 'function') {
      window[`init_${name}`]();
    }
  } catch(e) {
    container.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)">Failed to load page</div>`;
  }
}

// ── Nav click handlers ────────────────────────────────────────────────────────
document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => loadPage(el.dataset.page));
});

// ── Badge updaters called from partials ───────────────────────────────────────
window.setReqBadge = function(n) {
  const b = document.getElementById('reqBadge');
  b.style.display = n > 0 ? 'inline' : 'none';
  b.textContent = n;
};
window.setLibBadge = function(n) {
  const b = document.getElementById('libBadge');
  b.style.display = n > 0 ? 'inline' : 'none';
  b.textContent = n;
};

// ── Background download poll (keeps sidebar card updated always) ──────────────
async function pollDownloads() {
  try {
    const data = await fetch('/api/downloads').then(r=>r.json());
    window.updateSidebarDl(data);
    // If downloads page is open, refresh it too
    if (currentPage === 'downloads' && typeof window.init_downloads === 'function') {
      window._refreshDownloads && window._refreshDownloads(data);
    }
  } catch(e) {}
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatus();
loadPage('home');
setInterval(loadStatus,   30000);
setInterval(pollDownloads, 3000);
</script>

<script>
// ── Animated background engine ────────────────────────────────────────────────
const _animCanvas = document.getElementById('animBg');
const _animCtx    = _animCanvas ? _animCanvas.getContext('2d') : null;
window._animFrame  = null;
window._animType   = null;
let   _animTime   = 0;

function _resizeCanvas() {
  if (!_animCanvas) return;
  _animCanvas.width  = window.innerWidth;
  _animCanvas.height = window.innerHeight;
}
window.addEventListener('resize', _resizeCanvas);
_resizeCanvas();

// Orb state for nebula_storm / aurora / lava_lamp / arctic / void / ember
const _orbs = [
  { x:0.2, y:0.3, r:0.35, vx:0.00008, vy:0.00005 },
  { x:0.7, y:0.6, r:0.30, vx:-0.00006, vy:0.00007 },
  { x:0.5, y:0.2, r:0.25, vx:0.00005, vy:-0.00008 },
  { x:0.3, y:0.7, r:0.28, vx:-0.00007, vy:-0.00004 },
  { x:0.8, y:0.2, r:0.22, vx:0.00009, vy:0.00006 },
];

// Rain drops for neon_rain
const _drops = Array.from({length:60}, () => ({
  x: Math.random(),
  y: Math.random(),
  speed: 0.0002 + Math.random() * 0.0004,
  len: 0.04 + Math.random() * 0.08,
  op: 0.05 + Math.random() * 0.2,
  color: Math.random() > 0.5 ? '#00f5ff' : '#7c3aed',
}));

// Grid for grid_pulse
const _nodes = [];
for (let gx = 0; gx <= 14; gx++) {
  for (let gy = 0; gy <= 10; gy++) {
    _nodes.push({ gx, gy, phase: Math.random() * Math.PI * 2, speed: 0.0005 + Math.random() * 0.001 });
  }
}

function _drawFrame(ts) {
  if (!_animCtx || !window._animType) return;
  _animTime = ts * 0.001;
  const W = _animCanvas.width, H = _animCanvas.height;
  _animCtx.clearRect(0, 0, W, H);

  if (window._animType === 'nebula_storm') {
    _drawOrbs(W, H, [
      {c:'#7c3aed', o:0.45}, {c:'#0ea5e9', o:0.35}, {c:'#c026d3', o:0.28},
      {c:'#7c3aed', o:0.2},  {c:'#0ea5e9', o:0.18},
    ]);
    _drawStars(W, H, '#ffffff', 120);
  } else if (window._animType === 'aurora') {
    _drawOrbs(W, H, [
      {c:'#c084fc', o:0.4}, {c:'#818cf8', o:0.35}, {c:'#a855f7', o:0.3},
      {c:'#c084fc', o:0.2}, {c:'#818cf8', o:0.15},
    ]);
    _drawStars(W, H, '#ffffff', 80);
  } else if (window._animType === 'ember') {
    _drawOrbs(W, H, [
      {c:'#ea580c', o:0.5}, {c:'#dc2626', o:0.4}, {c:'#f59e0b', o:0.25},
      {c:'#ea580c', o:0.2}, {c:'#dc2626', o:0.15},
    ]);
    _drawEmbers(W, H);
  } else if (window._animType === 'arctic') {
    _drawOrbs(W, H, [
      {c:'#0ea5e9', o:0.38}, {c:'#06b6d4', o:0.3}, {c:'#38bdf8', o:0.22},
      {c:'#0ea5e9', o:0.18}, {c:'#06b6d4', o:0.14},
    ]);
    _drawStars(W, H, '#bae6fd', 100);
  } else if (window._animType === 'void') {
    _drawOrbs(W, H, [
      {c:'#6d28d9', o:0.35}, {c:'#4f46e5', o:0.28}, {c:'#7c3aed', o:0.2},
      {c:'#6d28d9', o:0.15}, {c:'#4f46e5', o:0.12},
    ]);
    _drawStars(W, H, '#ffffff', 200);
  } else if (window._animType === 'neon_rain') {
    _drawNeonRain(W, H);
  } else if (window._animType === 'lava_lamp') {
    _drawLavaLamp(W, H);
  } else if (window._animType === 'grid_pulse') {
    _drawGridPulse(W, H);
  } else if (window._animType === 'obsidian_royale') {
    _drawObsidianRoyale(W, H);
  } else if (window._animType === 'borealis_glass') {
    _drawBorealisGlass(W, H);
  } else if (window._animType === 'liquid_gold') {
    _drawLiquidGold(W, H);
  }

  if (window._animReduced) return;  // prefers-reduced-motion: single static frame
  window._animFrame = requestAnimationFrame(_drawFrame);
}

function _drawOrbs(W, H, colors) {
  _orbs.forEach((orb, i) => {
    orb.x += orb.vx;
    orb.y += orb.vy;
    if (orb.x < -0.1) orb.vx =  Math.abs(orb.vx);
    if (orb.x >  1.1) orb.vx = -Math.abs(orb.vx);
    if (orb.y < -0.1) orb.vy =  Math.abs(orb.vy);
    if (orb.y >  1.1) orb.vy = -Math.abs(orb.vy);
    const grad = _animCtx.createRadialGradient(
      orb.x*W, orb.y*H, 0,
      orb.x*W, orb.y*H, orb.r * Math.max(W,H)
    );
    const col = colors[i] || colors[0];
    grad.addColorStop(0, col.c + Math.round(col.o * 255).toString(16).padStart(2,'0'));
    grad.addColorStop(1, col.c + '00');
    _animCtx.fillStyle = grad;
    _animCtx.fillRect(0, 0, W, H);
  });
}

function _drawStars(W, H, color, count) {
  _animCtx.fillStyle = color;
  // Use seeded positions — stable, not redrawn every frame
  for (let i = 0; i < count; i++) {
    const sx = ((i * 137.508 + 23) % 1) * W;
    const sy = ((i * 97.3 + 11) % 1) * H;
    const op = 0.3 + (Math.sin(_animTime * 0.5 + i) * 0.5 + 0.5) * 0.4;
    const sz = 0.5 + (i % 3) * 0.4;
    _animCtx.globalAlpha = op;
    _animCtx.beginPath();
    _animCtx.arc(sx, sy, sz, 0, Math.PI * 2);
    _animCtx.fill();
  }
  _animCtx.globalAlpha = 1;
}

function _drawEmbers(W, H) {
  // Floating ember particles rising upward
  for (let i = 0; i < 40; i++) {
    const t = (_animTime * (0.05 + i * 0.003) + i * 0.7) % 1;
    const x = ((i * 73.1 + 17) % 1) * W + Math.sin(_animTime * 0.3 + i) * 30;
    const y = H * (1 - t);
    const op = t < 0.2 ? t/0.2 : t > 0.8 ? (1-t)/0.2 : 1;
    const sz = 1 + (i % 3) * 0.8;
    const colors = ['#f59e0b','#fb923c','#ea580c','#fbbf24'];
    _animCtx.globalAlpha = op * 0.6;
    _animCtx.fillStyle = colors[i % colors.length];
    _animCtx.beginPath();
    _animCtx.arc(x, y, sz, 0, Math.PI * 2);
    _animCtx.fill();
  }
  _animCtx.globalAlpha = 1;
}

function _drawNeonRain(W, H) {
  _drops.forEach(d => {
    d.y += d.speed;
    if (d.y - d.len > 1) d.y = -d.len;
    const grad = _animCtx.createLinearGradient(d.x*W, (d.y-d.len)*H, d.x*W, d.y*H);
    grad.addColorStop(0, d.color + '00');
    grad.addColorStop(1, d.color + Math.round(d.op * 255).toString(16).padStart(2,'0'));
    _animCtx.strokeStyle = grad;
    _animCtx.lineWidth = 0.8;
    _animCtx.beginPath();
    _animCtx.moveTo(d.x*W, (d.y-d.len)*H);
    _animCtx.lineTo(d.x*W, d.y*H);
    _animCtx.stroke();
  });
  // Glow pools at bottom
  const g1 = _animCtx.createRadialGradient(W*0.2, H, 0, W*0.2, H, W*0.3);
  g1.addColorStop(0, '#00f5ff22'); g1.addColorStop(1, '#00000000');
  _animCtx.fillStyle = g1; _animCtx.fillRect(0,0,W,H);
  const g2 = _animCtx.createRadialGradient(W*0.75, H, 0, W*0.75, H, W*0.3);
  g2.addColorStop(0, '#7c3aed22'); g2.addColorStop(1, '#00000000');
  _animCtx.fillStyle = g2; _animCtx.fillRect(0,0,W,H);
}

function _drawLavaLamp(W, H) {
  _orbs.forEach((orb, i) => {
    orb.x += orb.vx * 0.6;
    orb.y += orb.vy * 0.5 + Math.sin(_animTime * 0.3 + i) * 0.00008;
    if (orb.x < -0.1) orb.vx =  Math.abs(orb.vx);
    if (orb.x >  1.1) orb.vx = -Math.abs(orb.vx);
    if (orb.y < -0.1) orb.vy =  Math.abs(orb.vy);
    if (orb.y >  1.1) orb.vy = -Math.abs(orb.vy);
    const cols = ['#d946ef','#7c3aed','#ec4899','#a855f7','#d946ef'];
    const ops  = [0.55, 0.45, 0.4, 0.35, 0.25];
    const rMult = 0.4 + Math.sin(_animTime * 0.2 + i) * 0.05;
    const grad = _animCtx.createRadialGradient(
      orb.x*W, orb.y*H, 0,
      orb.x*W, orb.y*H, rMult * Math.max(W,H)
    );
    grad.addColorStop(0, cols[i] + Math.round(ops[i]*255).toString(16).padStart(2,'0'));
    grad.addColorStop(1, cols[i] + '00');
    _animCtx.fillStyle = grad;
    _animCtx.fillRect(0, 0, W, H);
  });
}

function _drawGridPulse(W, H) {
  const cellW = W / 14, cellH = H / 10;
  _animCtx.strokeStyle = '#00ff8820';
  _animCtx.lineWidth = 0.5;
  // Horizontal lines
  for (let gy = 0; gy <= 10; gy++) {
    _animCtx.beginPath();
    _animCtx.moveTo(0, gy*cellH);
    _animCtx.lineTo(W, gy*cellH);
    _animCtx.stroke();
  }
  // Vertical lines
  for (let gx = 0; gx <= 14; gx++) {
    _animCtx.beginPath();
    _animCtx.moveTo(gx*cellW, 0);
    _animCtx.lineTo(gx*cellW, H);
    _animCtx.stroke();
  }
  // Pulsing nodes at intersections
  _nodes.forEach(n => {
    const pulse = Math.sin(_animTime * n.speed * 1000 + n.phase);
    const op = (pulse * 0.5 + 0.5) * 0.7;
    const sz = Math.max(0.1, 1 + pulse * 1.5);
    _animCtx.globalAlpha = op;
    _animCtx.fillStyle = '#00ff88';
    _animCtx.beginPath();
    _animCtx.arc(n.gx * cellW, n.gy * cellH, sz, 0, Math.PI * 2);
    _animCtx.fill();
  });
  _animCtx.globalAlpha = 1;
  // Center glow
  const cg = _animCtx.createRadialGradient(W/2,H/2,0, W/2,H/2, W*0.45);
  cg.addColorStop(0, '#00ff8818'); cg.addColorStop(1, '#00000000');
  _animCtx.fillStyle = cg; _animCtx.fillRect(0,0,W,H);
}

// ── VIP dedicated renderers ───────────────────────────────────────────────────

// Obsidian Royale: parallax violet/gold orb layers, rising gold dust, shimmer sweep
const _royOrbs = [
  { x:0.25, y:0.35, r:0.42, sp:0.10, ph:0.0, c:'#4c1d95', o:0.40 },
  { x:0.75, y:0.25, r:0.38, sp:0.08, ph:2.1, c:'#6d28d9', o:0.32 },
  { x:0.55, y:0.75, r:0.40, sp:0.09, ph:4.2, c:'#3b0764', o:0.35 },
  { x:0.80, y:0.70, r:0.26, sp:0.16, ph:1.3, c:'#d4af37', o:0.22 },
  { x:0.20, y:0.80, r:0.22, sp:0.19, ph:3.7, c:'#b8860b', o:0.18 },
];
const _royDust = Array.from({length:60}, () => ({
  x: Math.random(), y: Math.random(),
  rise: 0.008 + Math.random()*0.02, sway: 2 + Math.random()*3,
  ph: Math.random()*Math.PI*2, sz: 0.6 + Math.random()*1.2,
}));

function _drawObsidianRoyale(W, H) {
  _royOrbs.forEach(o => {
    const x = (o.x + Math.sin(_animTime*o.sp + o.ph)*0.08) * W;
    const y = (o.y + Math.cos(_animTime*o.sp*0.8 + o.ph)*0.06) * H;
    const g = _animCtx.createRadialGradient(x, y, 0, x, y, o.r*Math.max(W,H));
    g.addColorStop(0, o.c + Math.round(o.o*255).toString(16).padStart(2,'0'));
    g.addColorStop(1, o.c + '00');
    _animCtx.fillStyle = g; _animCtx.fillRect(0, 0, W, H);
  });
  _royDust.forEach((d, i) => {
    const y = ((d.y - _animTime*d.rise) % 1 + 1) % 1;
    const x = (d.x + Math.sin(_animTime*0.1*d.sway + d.ph)*0.01) * W;
    const tw = 0.25 + (Math.sin(_animTime*1.5 + d.ph)*0.5 + 0.5)*0.55;
    _animCtx.globalAlpha = tw*0.7;
    _animCtx.fillStyle = i % 3 ? '#d4af37' : '#f5d76e';
    _animCtx.beginPath(); _animCtx.arc(x, y*H, d.sz, 0, Math.PI*2); _animCtx.fill();
  });
  _animCtx.globalAlpha = 1;
  // diagonal gold shimmer sweeping across every ~11s
  const sw = (_animTime % 11) / 11;
  if (sw < 0.35) {
    const p = sw/0.35, cx = (p*1.6 - 0.3)*W;
    const op = Math.round(Math.sin(p*Math.PI)*0.07*255).toString(16).padStart(2,'0');
    const g = _animCtx.createLinearGradient(cx - W*0.12, 0, cx + W*0.12, H*0.25);
    g.addColorStop(0, '#f5d76e00'); g.addColorStop(0.5, '#f5d76e' + op); g.addColorStop(1, '#f5d76e00');
    _animCtx.fillStyle = g; _animCtx.fillRect(0, 0, W, H);
  }
}

// Borealis Glass: undulating aurora ribbons, rotating conic glow, cool stars
const _borRibbons = [
  { base:0.22, amp:0.06, freq:2.1, speed:0.24, th:0.16, c:'#2dd4bf', o:0.20 },
  { base:0.32, amp:0.08, freq:1.6, speed:0.18, th:0.20, c:'#818cf8', o:0.17 },
  { base:0.45, amp:0.05, freq:2.6, speed:0.30, th:0.13, c:'#ec4899', o:0.10 },
];

function _drawBorealisGlass(W, H) {
  if (_animCtx.createConicGradient) {
    const cg = _animCtx.createConicGradient(_animTime*0.05, W*0.5, H*0.45);
    cg.addColorStop(0, '#818cf818'); cg.addColorStop(0.25, '#2dd4bf14');
    cg.addColorStop(0.5, '#ec489910'); cg.addColorStop(0.75, '#8b5cf614');
    cg.addColorStop(1, '#818cf818');
    _animCtx.fillStyle = cg; _animCtx.fillRect(0, 0, W, H);
  }
  _borRibbons.forEach(r => {
    const steps = 40;
    _animCtx.beginPath();
    for (let s = 0; s <= steps; s++) {
      const x = s/steps;
      const y = r.base + Math.sin(x*r.freq*Math.PI*2 + _animTime*r.speed)*r.amp;
      s === 0 ? _animCtx.moveTo(x*W, y*H) : _animCtx.lineTo(x*W, y*H);
    }
    for (let s = steps; s >= 0; s--) {
      const x = s/steps;
      const y = r.base + r.th + Math.sin(x*r.freq*Math.PI*2 + _animTime*r.speed + 0.7)*r.amp;
      _animCtx.lineTo(x*W, y*H);
    }
    _animCtx.closePath();
    const g = _animCtx.createLinearGradient(0, (r.base - r.amp)*H, 0, (r.base + r.th + r.amp)*H);
    g.addColorStop(0, r.c + '00');
    g.addColorStop(0.5, r.c + Math.round(r.o*255).toString(16).padStart(2,'0'));
    g.addColorStop(1, r.c + '00');
    _animCtx.fillStyle = g; _animCtx.fill();
  });
  _drawStars(W, H, '#dbeafe', 110);
}

// Liquid Gold: molten pulsing blobs on lissajous paths, rising champagne bubbles
const _lgBlobs = [
  { cx:0.30, cy:0.72, ax:0.10, ay:0.05, sx:0.11, sy:0.15, ph:0.0, r:0.34, c:'#f59e0b', o:0.30 },
  { cx:0.68, cy:0.80, ax:0.12, ay:0.06, sx:0.09, sy:0.12, ph:2.0, r:0.38, c:'#ea580c', o:0.26 },
  { cx:0.50, cy:0.60, ax:0.14, ay:0.07, sx:0.07, sy:0.10, ph:4.1, r:0.30, c:'#e8b04b', o:0.22 },
  { cx:0.85, cy:0.35, ax:0.08, ay:0.09, sx:0.06, sy:0.08, ph:1.2, r:0.26, c:'#b45309', o:0.20 },
  { cx:0.15, cy:0.30, ax:0.07, ay:0.08, sx:0.08, sy:0.06, ph:5.0, r:0.24, c:'#f5b942', o:0.16 },
];
const _lgBubbles = Array.from({length:36}, () => ({
  x: Math.random(), start: Math.random(),
  speed: 0.015 + Math.random()*0.03, sz: 1 + Math.random()*2.4,
  sway: 1 + Math.random()*2, ph: Math.random()*Math.PI*2,
}));

function _drawLiquidGold(W, H) {
  _lgBlobs.forEach(b => {
    const rp = 1 + Math.sin(_animTime*0.18 + b.ph)*0.12;
    const x = (b.cx + Math.sin(_animTime*b.sx + b.ph)*b.ax)*W;
    const y = (b.cy + Math.sin(_animTime*b.sy + b.ph*1.3)*b.ay)*H;
    const g = _animCtx.createRadialGradient(x, y, 0, x, y, b.r*rp*Math.max(W,H));
    g.addColorStop(0, b.c + Math.round(b.o*255).toString(16).padStart(2,'0'));
    g.addColorStop(1, b.c + '00');
    _animCtx.fillStyle = g; _animCtx.fillRect(0, 0, W, H);
  });
  _lgBubbles.forEach(b => {
    const t = (b.start + _animTime*b.speed) % 1;
    const y = (1 - t)*H;
    const x = (b.x + Math.sin(_animTime*0.4*b.sway + b.ph)*0.015)*W;
    const op = (t < 0.15 ? t/0.15 : t > 0.85 ? (1 - t)/0.15 : 1)*0.35;
    _animCtx.globalAlpha = op;
    _animCtx.strokeStyle = '#f5d76e'; _animCtx.lineWidth = 0.8;
    _animCtx.beginPath(); _animCtx.arc(x, y, b.sz, 0, Math.PI*2); _animCtx.stroke();
  });
  _animCtx.globalAlpha = 1;
}

window.startAnimation = function(type) {
  if (window._animFrame) { cancelAnimationFrame(window._animFrame); window._animFrame = null; }
  if (!type || !_animCanvas) return;
  window._animReduced = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  window._animType = type;
  _animCanvas.style.opacity = '1';
  window._animFrame = requestAnimationFrame(_drawFrame);
};

window.stopAnimation = function() {
  if (window._animFrame) { cancelAnimationFrame(window._animFrame); window._animFrame = null; }
  window._animType = null;
  if (_animCanvas) _animCanvas.style.opacity = '0';
};

// Now that animation engine is ready, start animation for saved theme if needed
(function() {
  const saved = window._pendingInitTheme || localStorage.getItem('einthubot_theme') || 'amber';
  const t = THEMES[saved];
  if (t && t.animated) {
    // Make containers transparent so animation shows through
    document.body.style.background = t.bg;
    const pc = document.getElementById('page-container');
    if (pc) pc.style.background = 'transparent';
    const sb = document.getElementById('sidebar');
    if (sb) sb.style.background = 'transparent';
    const mn = document.getElementById('main');
    if (mn) mn.style.background = 'transparent';
    window.startAnimation(t.animated);
  }
})();
</script>
